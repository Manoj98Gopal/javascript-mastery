    <style>
      .frame {
        width: 480px;
        height: 800px;
        border: 4px solid black;
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .frame1 {
        width: 9.6cm;
        height: 16cm;
        border: 4px solid black;
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .frame2 {
        width: 20.28cm;
        height: 27.04cm;
        border: 4px solid black;
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .layout {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 100px;
      }

      .image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: bottom;
      }

      .image-container {
        width: 100%;

      }

      .image-container1 {
        width: 100%;
      }

      .image-container2 {
        width: 100%;
        aspect-ratio: 6/10;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="frame1">
        <div class="image-container">
          <img alt="image" src="./public/potrate1.jpg" class="image" />
        </div>
      </div>

      <div class="frame2">
         <div class="image-container1">

        </div>
      </div>
